{% extends "base.html" %}

{% block contenido %}

<div class="row">

<div class="col-md-6">

{% if producto.imagen %}
<img src="{{ producto.imagen.url }}" class="img-fluid">
{% endif %}

</div>

<div class="col-md-6">

<h2>{{ producto.nombre }}</h2>

<p><b>Marca:</b> {{ producto.marca }}</p>

<p>{{ producto.descripcion }}</p>

<h3>$ {{ producto.precio }}</h3>

</div>

</div>

{% endblock %}
